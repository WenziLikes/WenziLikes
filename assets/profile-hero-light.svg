<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Viacheslav Murakhin — Full-Stack Developer</title>
  <desc id="desc">Light portfolio banner for a frontend-focused full-stack developer in Ontario, Canada.</desc>
  <defs>
    <linearGradient id="bg" x1="32" y1="8" x2="1144" y2="350" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="0.55" stop-color="#F6F9FE"/>
      <stop offset="1" stop-color="#EEF4FB"/>
    </linearGradient>
    <linearGradient id="headline" x1="70" y1="125" x2="625" y2="182" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="0.5" stop-color="#1E3A8A"/>
      <stop offset="1" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0284C7"/>
      <stop offset="0.48" stop-color="#4F46E5"/>
      <stop offset="1" stop-color="#9333EA"/>
    </linearGradient>
    <radialGradient id="glowBlue">
      <stop stop-color="#38BDF8" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowViolet">
      <stop stop-color="#8B5CF6" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0V28" fill="none" stroke="#1D4ED8" stroke-opacity="0.045"/>
    </pattern>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="28"/>
    </filter>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
    <clipPath id="frame">
      <rect x="1" y="1" width="1198" height="358" rx="28"/>
    </clipPath>
  </defs>

  <g clip-path="url(#frame)">
    <rect x="1" y="1" width="1198" height="358" rx="28" fill="url(#bg)"/>
    <rect x="1" y="1" width="1198" height="358" rx="28" fill="url(#grid)"/>
    <circle cx="170" cy="18" r="230" fill="url(#glowBlue)" filter="url(#blur)"/>
    <circle cx="1085" cy="72" r="250" fill="url(#glowViolet)" filter="url(#blur)"/>
    <path d="M0 307C221 249 375 344 586 287C770 237 952 253 1200 179V360H0Z" fill="#DDE8F7" fill-opacity="0.34"/>
    <path d="M0 322C228 269 383 353 596 299C788 251 962 263 1200 205" fill="none" stroke="url(#accent)" stroke-opacity="0.15"/>

    <g font-family="Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
      <g transform="translate(70 54)">
        <rect width="351" height="35" rx="17.5" fill="#FFFFFF" fill-opacity="0.72" stroke="#1D4ED8" stroke-opacity="0.13"/>
        <circle cx="19" cy="17.5" r="4" fill="#0284C7"/>
        <text x="33" y="22.5" fill="#1E3A8A" font-size="13" font-weight="700" letter-spacing="1.65">FULL-STACK DEVELOPER · FRONTEND FOCUS</text>
      </g>

      <text x="70" y="157" fill="url(#headline)" font-size="60" font-weight="780" letter-spacing="-2.5">Viacheslav Murakhin</text>
      <text x="72" y="203" fill="#334155" fill-opacity="0.86" font-size="21" font-weight="520">Clear interfaces. Reliable systems. Production-minded delivery.</text>

      <g transform="translate(70 250)" font-size="12.5" font-weight="700" letter-spacing="1.05">
        <rect width="180" height="38" rx="12" fill="#E0F2FE" stroke="#0284C7" stroke-opacity="0.2"/>
        <text x="18" y="24" fill="#075985">REACT + TYPESCRIPT</text>
        <g transform="translate(194)">
          <rect width="143" height="38" rx="12" fill="#EEF2FF" stroke="#4F46E5" stroke-opacity="0.18"/>
          <text x="18" y="24" fill="#3730A3">NODE + JAVA</text>
        </g>
        <g transform="translate(351)">
          <rect width="178" height="38" rx="12" fill="#FAF5FF" stroke="#9333EA" stroke-opacity="0.16"/>
          <text x="18" y="24" fill="#6B21A8">PRODUCT DELIVERY</text>
        </g>
      </g>

      <text x="72" y="325" fill="#475569" fill-opacity="0.72" font-size="12.5" font-weight="650" letter-spacing="2.15">NIAGARA REGION · ONTARIO · CANADA</text>
    </g>

    <g filter="url(#softShadow)">
      <g transform="translate(817 55)">
        <rect width="259" height="65" rx="16" fill="#FFFFFF" fill-opacity="0.88" stroke="#1D4ED8" stroke-opacity="0.1"/>
        <circle cx="25" cy="23" r="5" fill="#0284C7"/>
        <rect x="42" y="18" width="97" height="7" rx="3.5" fill="#334155" fill-opacity="0.32"/>
        <rect x="24" y="40" width="177" height="6" rx="3" fill="#2563EB" fill-opacity="0.1"/>
        <rect x="211" y="18" width="25" height="25" rx="7" fill="#EEF2FF" stroke="#4F46E5" stroke-opacity="0.14"/>
      </g>
      <g transform="translate(867 257)">
        <rect width="250" height="58" rx="15" fill="#FFFFFF" fill-opacity="0.84" stroke="#7C3AED" stroke-opacity="0.09"/>
        <rect x="21" y="18" width="91" height="7" rx="3.5" fill="#334155" fill-opacity="0.28"/>
        <rect x="21" y="34" width="145" height="6" rx="3" fill="#7C3AED" fill-opacity="0.09"/>
        <circle cx="218" cy="29" r="10" fill="#FAF5FF" stroke="#9333EA" stroke-opacity="0.16"/>
      </g>
    </g>

    <g transform="translate(987 178)">
      <circle r="94" fill="#FFFFFF" fill-opacity="0.8" stroke="#1D4ED8" stroke-opacity="0.11"/>
      <circle r="74" fill="none" stroke="url(#accent)" stroke-opacity="0.3" stroke-width="1.5"/>
      <circle r="51" fill="none" stroke="#1E3A8A" stroke-opacity="0.1"/>
      <path d="M0-77L11-12L0-21L-11-12Z" fill="#0F172A"/>
      <path d="M0 77L-8 17L0 23L8 17Z" fill="#1D4ED8" fill-opacity="0.82"/>
      <path d="M-77 0L-16 9L-23 0L-16-9Z" fill="#0284C7" fill-opacity="0.68"/>
      <path d="M77 0L16-9L23 0L16 9Z" fill="#9333EA" fill-opacity="0.6"/>
      <circle r="9" fill="#FFFFFF" stroke="#0F172A" stroke-opacity="0.14"/>
      <circle r="15" fill="none" stroke="#1D4ED8" stroke-opacity="0.22"/>
      <path d="M0-105L3.5-97L12-93.5L3.5-90L0-82L-3.5-90L-12-93.5L-3.5-97Z" fill="#0284C7"/>
      <path d="M0-62V-56M62 0H56M0 62V56M-62 0H-56M44-44L39-39M44 44L39 39M-44 44L-39 39M-44-44L-39-39" stroke="#1E3A8A" stroke-opacity="0.34" stroke-width="2" stroke-linecap="round"/>
    </g>
  </g>

  <rect x="1" y="1" width="1198" height="358" rx="28" fill="none" stroke="#1D4ED8" stroke-opacity="0.1"/>
</svg>
