<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Viacheslav Murakhin — Full-Stack Developer</title>
  <desc id="desc">Dark portfolio banner for a frontend-focused full-stack developer in Ontario, Canada.</desc>
  <defs>
    <linearGradient id="bg" x1="46" y1="20" x2="1132" y2="350" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07101F"/>
      <stop offset="0.52" stop-color="#050B17"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="headline" x1="70" y1="125" x2="625" y2="182" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FBFF"/>
      <stop offset="0.5" stop-color="#D8E4FF"/>
      <stop offset="1" stop-color="#AFC0FF"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#7DD3FC"/>
      <stop offset="0.48" stop-color="#818CF8"/>
      <stop offset="1" stop-color="#C084FC"/>
    </linearGradient>
    <radialGradient id="glowBlue">
      <stop stop-color="#38BDF8" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowViolet">
      <stop stop-color="#8B5CF6" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0V28" fill="none" stroke="#BFDBFE" stroke-opacity="0.055"/>
    </pattern>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="28"/>
    </filter>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity="0.52"/>
    </filter>
    <clipPath id="frame">
      <rect x="1" y="1" width="1198" height="358" rx="28"/>
    </clipPath>
  </defs>

  <g clip-path="url(#frame)">
    <rect x="1" y="1" width="1198" height="358" rx="28" fill="url(#bg)"/>
    <rect x="1" y="1" width="1198" height="358" rx="28" fill="url(#grid)"/>
    <circle cx="170" cy="18" r="230" fill="url(#glowBlue)" filter="url(#blur)"/>
    <circle cx="1085" cy="72" r="250" fill="url(#glowViolet)" filter="url(#blur)"/>
    <path d="M0 307C221 249 375 344 586 287C770 237 952 253 1200 179V360H0Z" fill="#0B1530" fill-opacity="0.34"/>
    <path d="M0 322C228 269 383 353 596 299C788 251 962 263 1200 205" fill="none" stroke="url(#accent)" stroke-opacity="0.15"/>

    <g font-family="Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
      <g transform="translate(70 54)">
        <rect width="351" height="35" rx="17.5" fill="#FFFFFF" fill-opacity="0.055" stroke="#BFDBFE" stroke-opacity="0.16"/>
        <circle cx="19" cy="17.5" r="4" fill="#7DD3FC"/>
        <text x="33" y="22.5" fill="#C9D8FF" font-size="13" font-weight="700" letter-spacing="1.65">FULL-STACK DEVELOPER · FRONTEND FOCUS</text>
      </g>

      <text x="70" y="157" fill="url(#headline)" font-size="60" font-weight="780" letter-spacing="-2.5">Viacheslav Murakhin</text>
      <text x="72" y="203" fill="#CBD5E1" fill-opacity="0.83" font-size="21" font-weight="520">Clear interfaces. Reliable systems. Production-minded delivery.</text>

      <g transform="translate(70 250)" font-size="12.5" font-weight="700" letter-spacing="1.05">
        <rect width="180" height="38" rx="12" fill="#0EA5E9" fill-opacity="0.1" stroke="#7DD3FC" stroke-opacity="0.24"/>
        <text x="18" y="24" fill="#BAE6FD">REACT + TYPESCRIPT</text>
        <g transform="translate(194)">
          <rect width="143" height="38" rx="12" fill="#6366F1" fill-opacity="0.1" stroke="#A5B4FC" stroke-opacity="0.22"/>
          <text x="18" y="24" fill="#C7D2FE">NODE + JAVA</text>
        </g>
        <g transform="translate(351)">
          <rect width="178" height="38" rx="12" fill="#A855F7" fill-opacity="0.08" stroke="#D8B4FE" stroke-opacity="0.2"/>
          <text x="18" y="24" fill="#E9D5FF">PRODUCT DELIVERY</text>
        </g>
      </g>

      <text x="72" y="325" fill="#94A3B8" fill-opacity="0.72" font-size="12.5" font-weight="650" letter-spacing="2.15">NIAGARA REGION · ONTARIO · CANADA</text>
    </g>

    <g filter="url(#softShadow)">
      <g transform="translate(817 55)">
        <rect width="259" height="65" rx="16" fill="#FFFFFF" fill-opacity="0.055" stroke="#BFDBFE" stroke-opacity="0.14"/>
        <circle cx="25" cy="23" r="5" fill="#7DD3FC" fill-opacity="0.92"/>
        <rect x="42" y="18" width="97" height="7" rx="3.5" fill="#E2E8F0" fill-opacity="0.42"/>
        <rect x="24" y="40" width="177" height="6" rx="3" fill="#93C5FD" fill-opacity="0.16"/>
        <rect x="211" y="18" width="25" height="25" rx="7" fill="#818CF8" fill-opacity="0.13" stroke="#A5B4FC" stroke-opacity="0.18"/>
      </g>
      <g transform="translate(867 257)">
        <rect width="250" height="58" rx="15" fill="#FFFFFF" fill-opacity="0.045" stroke="#C4B5FD" stroke-opacity="0.12"/>
        <rect x="21" y="18" width="91" height="7" rx="3.5" fill="#E2E8F0" fill-opacity="0.32"/>
        <rect x="21" y="34" width="145" height="6" rx="3" fill="#C4B5FD" fill-opacity="0.15"/>
        <circle cx="218" cy="29" r="10" fill="#A855F7" fill-opacity="0.13" stroke="#D8B4FE" stroke-opacity="0.2"/>
      </g>
    </g>

    <g transform="translate(987 178)">
      <circle r="94" fill="#071225" fill-opacity="0.78" stroke="#BFDBFE" stroke-opacity="0.15"/>
      <circle r="74" fill="none" stroke="url(#accent)" stroke-opacity="0.34" stroke-width="1.5"/>
      <circle r="51" fill="none" stroke="#C7D2FE" stroke-opacity="0.12"/>
      <path d="M0-77L11-12L0-21L-11-12Z" fill="#EAF1FF"/>
      <path d="M0 77L-8 17L0 23L8 17Z" fill="#9CB8FF" fill-opacity="0.9"/>
      <path d="M-77 0L-16 9L-23 0L-16-9Z" fill="#7DD3FC" fill-opacity="0.68"/>
      <path d="M77 0L16-9L23 0L16 9Z" fill="#C084FC" fill-opacity="0.66"/>
      <circle r="9" fill="#F8FBFF"/>
      <circle r="15" fill="none" stroke="#AFC0FF" stroke-opacity="0.3"/>
      <path d="M0-105L3.5-97L12-93.5L3.5-90L0-82L-3.5-90L-12-93.5L-3.5-97Z" fill="#7DD3FC"/>
      <path d="M0-62V-56M62 0H56M0 62V56M-62 0H-56M44-44L39-39M44 44L39 39M-44 44L-39 39M-44-44L-39-39" stroke="#DDE7FF" stroke-opacity="0.42" stroke-width="2" stroke-linecap="round"/>
    </g>
  </g>

  <rect x="1" y="1" width="1198" height="358" rx="28" fill="none" stroke="#BFDBFE" stroke-opacity="0.13"/>
</svg>
